<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{error.page.title}">KUMO - 에러 발생</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/errorView/errorPage.css}">

    <script defer th:src="@{/js/errorView/errorPage.js}"></script>
</head>
<body>

<div class="error-card">
    <h1 class="error-code" th:text="${errorCode}">500</h1>
    <h2 class="error-title" th:text="#{error.page.heading}">문제가 발생했습니다.</h2>

    <p class="error-desc" th:text="${errorMessage != null ? errorMessage : #messages.msg('error.page.default_desc')}">
        페이지를 처리하는 중 오류가 발생했습니다.
    </p>

    <details class="dev-trace-box" th:if="${errorTrace != null and !errorTrace.isEmpty()}">
        <summary th:text="#{error.page.dev_log}">🛠️ 개발자용 에러 로그 보기 (클릭하여 펼치기)</summary>
        <pre th:text="${errorTrace}"></pre>
    </details>

    <div class="btn-box">
        <button id="btnGoBack" class="btn btn-prev" th:text="#{error.page.btn_prev}">이전 페이지</button>
        <a th:href="@{/}" class="btn btn-home" th:text="#{error.page.btn_home}">메인으로 가기</a>
    </div>
</div>

</body>
</html>
