<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head>
    <meta charset="UTF-8" />
    <title>KUMO RECRUITER - 대시보드</title>
    <script th:src="@{/js/recruiter/main.js}"></script>
    <script th:src="@{/js/recruiter/recruiterHeader.js}"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/recruiter/recruiterHeader.css}" />
    <link
      rel="stylesheet"
      th:href="@{/css/NonLoginFragments/NonLoginFooter.css}"
    />
    <link rel="stylesheet" th:href="@{/css/recruiter/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/main.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/rightSidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/calendar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/dark-theme.css}" />
  </head>
  <body>
    <header
      th:replace="~{recruiterView/fragments/recruiterHeader :: headerFragment}"
    ></header>

    <div class="dashboard-wrapper">
      <div
        th:replace="~{recruiterView/fragments/sidebar :: sidebarFragment}"
      ></div>

      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <script th:inline="javascript">
          /*<![CDATA[*/
          const chartLabels = /*[[${chartLabels}]]*/ [];
          const chartData = /*[[${chartData}]]*/ [];
          /*]]>*/
      </script>

      <div class="main-container">        <main class="content-body">
          <div class="dashboard-left-content">
            <div class="welcome-section mb-4">
              <div sec:authorize="isAuthenticated()">
                <h2 th:text="#{main.welcome.title(${user.nickname})}"></h2>
                <p class="text-muted" th:text="#{main.welcome.subtitle}">
                  오늘의 채용 현황을 확인해보세요.
                </p>
              </div>
            </div>

            <div class="stat-row">
              <div class="stat-card">
                <span
                  class="text-muted small"
                  th:text="#{main.stat.total_applicants}"
                  >전체 지원자</span
                >
                <h4
                  class="fw-bold mt-2 mb-0"
                  th:text="${#numbers.formatInteger(totalApplicants ?: 0, 0, 'COMMA')}"
                >
                  1,240
                </h4>
              </div>
              <div class="stat-card">
                <span
                  class="text-muted small"
                  th:text="#{main.stat.new_applicants}"
                  >미확인 지원자</span
                >
                <h4
                  class="fw-bold mt-2 mb-0 text-primary"
                  th:text="${#numbers.formatInteger(unreadApplicants ?: 0, 0, 'COMMA')}"
                >
                  0
                </h4>
              </div>
              <div class="stat-card">
                <span class="text-muted small" th:text="#{main.stat.total_jobs}">모집 중 공고</span>
                <h4 class="fw-bold mt-2 mb-0" th:text="${#lists.size(jobList.?[status == 'RECRUITING'])}">
                  0
                </h4>
              </div>
              <div class="stat-card">
                <span
                  class="text-muted small"
                  th:text="#{main.stat.today_visits}"
                  >오늘 방문수</span
                >
                <h4
                  class="fw-bold mt-2 mb-0 text-success"
                  th:text="${#numbers.formatInteger(todayVisits ?: 0, 0, 'COMMA')}"
                >
                  0
                </h4>
              </div>
            </div>

            <div class="mid-row mt-4">
              <section class="panel panel-scout">
                <div class="panel-header d-flex justify-content-between align-items-center">
                  <h5 class="panel-title mb-0" th:text="#{main.panel.scout_status}">스카우트</h5>
                  <a class="panel-link text-decoration-none" th:href="@{/Recruiter/TalentList}" th:text="#{main.sidebar.view_all}">전체보기</a>
                </div>
                <div class="panel-body">
                  <div
                    class="empty-state"
                    th:if="${talents == null or #lists.isEmpty(talents)}"
                    th:text="#{main.scout.empty}"
                  >
                    스카우트할 인재가 없습니다.
                  </div>
                  <div class="scout-item" th:each="t : ${talents}" style="cursor:pointer;" 
                       th:onclick="|location.href='/Recruiter/TalentDetail?userId=${t.user.userId}'|">
                    <div class="scout-left">
                      <img
                        class="scout-avatar"
                        th:src="${t.user.profileImage?.fileUrl ?: '/images/common/default_profile.png'}"
                        alt="avatar"
                      />
                      <div class="scout-info">
                        <span class="scout-name" 
                              th:text="${#strings.length(t.user.nameKanjiMei ?: t.user.nickname) > 1 
                                       ? #strings.substring(t.user.nameKanjiMei ?: t.user.nickname, 0, 1) + '*' + #strings.substring(t.user.nameKanjiMei ?: t.user.nickname, #strings.length(t.user.nameKanjiMei ?: t.user.nickname)-1) 
                                       : t.user.nameKanjiMei ?: t.user.nickname}">이름</span>
                        <span class="scout-sub-text" th:text="${t.careerType == 'EXPERIENCED'} ? #{resume.btn.experienced} : #{resume.btn.newcomer}">
                          캐리어
                        </span>
                      </div>
                    </div>
                    <div class="scout-right">
                      <i class="fa-solid fa-chevron-right" style="color: #ccc; font-size: 0.8rem;"></i>
                    </div>
                  </div>
                </div>
              </section>

              <section class="panel panel-chart">
                <div class="panel-header">
                  <h5
                    class="panel-title mb-0"
                    th:text="#{main.panel.applicant_chart}"
                  >
                    일별 지원자 수
                  </h5>
                </div>
                <div class="panel-body">
                  <div class="chart-placeholder">
                    <canvas id="applicantChart"></canvas>
                  </div>
                </div>
              </section>
            </div>

            <section class="panel panel-myjobs mt-4">
              <div
                class="panel-header d-flex justify-content-between align-items-center"
              >
                <h5 class="panel-title mb-0" th:text="#{main.panel.my_jobs}">
                  최근 공고
                </h5>
                <a
                  class="panel-link text-decoration-none"
                  th:href="@{/Recruiter/JobManage}"
                  th:text="#{main.sidebar.view_all}"
                  >전체보기</a
                >
              </div>
              <div class="panel-body">
                <div class="myjobs-head">
                  <span style="flex: 2;" th:text="#{main.myjobs.col.title}">공고 제목</span>
                  <span style="flex: 1;" th:text="#{main.myjobs.col.region}">지역</span>
                  <span style="flex: 1.5;" th:text="#{main.myjobs.col.wage}">급여</span>
                  <span style="flex: 1.2;" th:text="#{main.myjobs.col.date}">등록일</span>
                  <span style="flex: 1;" th:text="#{main.myjobs.col.manage}">관리</span>
                </div>
              
                <div class="empty-state" th:if="${jobList == null or #lists.isEmpty(jobList)}" th:text="#{main.myjobs.empty}">
                  등록된 공고가 없습니다.
                </div>
              
                <div class="myjobs-row" th:each="job, iterStat : ${jobList}" th:if="${iterStat.index < 2}">
                  <div class="job-title" style="flex: 2;">
                    <div class="job-name text-truncate" th:text="${job.title}">공고명</div>
                  </div>
                
                  <div style="flex: 1;">
                    <span th:if="${job.regionType == '도쿄'}" th:text="#{region.tokyo}">도쿄</span>
                    <span th:if="${job.regionType == '오사카'}" th:text="#{region.osaka}">오사카</span>
                  </div>
                
                  <div style="flex: 1.5;">
                    <span th:if="${#locale.language == 'ko'}" th:text="${job.wage}">급여(한글)</span>
                    <span th:if="${#locale.language == 'ja'}" th:text="${job.wageJp}">給与(일어)</span>
                    <span th:if="${#locale.language != 'ko' and #locale.language != 'ja'}" th:text="${job.wage}">급여(기본)</span>
                  </div>
                
                  <div style="flex: 1.2;" th:text="${#temporals.format(job.createdAt, 'yyyy-MM-dd')}">등록일</div>
                  <div style="flex: 1;">
                    <a class="btn-detail"
                      th:href="@{/Recruiter/editJobPosting(id=${job.id}, region=${job.regionType == '도쿄' ? 'TOKYO' : 'OSAKA'})}"
                      th:text="#{main.myjobs.btn.edit}">공고 수정</a>
                  </div>
                </div>
              </div>
            </section>

            <footer
              th:replace="~{NonLoginFragments/NonLoginFooter :: footerFragment}"
            ></footer>
          </div>

          <div
            th:replace="~{recruiterView/fragments/rightSidebar :: rightSidebarFragment}"
          ></div>
        </main>
      </div>
    </div>

    <div th:replace="~{fragments/floatingChat :: floatingChatFragment}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.js"></script>
<script th:src="@{/js/recruiter/rightSidebar.js}"></script>
    <script th:src="@{/js/recruiter/global-calendar.js}"></script>
  </body>
</html>
