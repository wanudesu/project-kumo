<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">

<head>
    <meta charset="UTF-8" />
    <title th:text="#{job.edit.page_title}">KUMO RECRUITER - 공고 수정</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" th:href="@{/css/recruiter/recruiterHeader.css}" />
    <link rel="stylesheet" th:href="@{/css/NonLoginFragments/NonLoginFooter.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/main.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/jobPosting.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/companyInfo.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/rightSidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/calendar.css}" />
    <link rel="stylesheet" th:href="@{/css/recruiter/dark-theme.css}" />
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script th:inline="javascript">
        /* <![CDATA[ */
        const msgCloseTitle = /*[[#{job.edit.swal.close_title}]]*/ '공고를 마감하시겠습니까?';
        const msgCloseText  = /*[[#{job.edit.swal.close_text}]]*/ '마감된 공고는 지원자가 더 이상 지원할 수 없습니다.';
        const msgBtnClose   = /*[[#{job.edit.swal.btn_close}]]*/ '마감하기';
        const msgBtnCancel  = /*[[#{job.edit.swal.btn_cancel}]]*/ '취소';
        const msgOkTitle    = /*[[#{job.edit.swal.ok_title}]]*/ '마감 완료!';
        const msgOkText     = /*[[#{job.edit.swal.ok_text}]]*/ '공고가 성공적으로 마감되었습니다.';
        const msgErrorTitle = /*[[#{job.edit.swal.error_title}]]*/ '에러 발생';
        const msgErrorFail  = /*[[#{job.edit.swal.error_fail}]]*/ '마감 처리에 실패했습니다.';
        const msgErrorComm  = /*[[#{job.edit.swal.error_comm}]]*/ '서버와 통신 중 문제가 생겼습니다.';

        const contactErrors = {
            empty:   /*[[#{post.error.contact.empty}]]*/ '연락처를 입력해주세요.',
            invalid: /*[[#{post.error.contact.invalid}]]*/ '올바른 전화번호 형식이 아닙니다. (예: 090-1234-5678)'
        };
        /* ]]> */
    </script>

    <script defer th:src="@{/js/recruiter/recruiterHeader.js}"></script>
    <script defer th:src="@{/js/recruiter/global-calendar.js}"></script>
    <script defer th:src="@{/js/recruiter/editJobPosting.js}"></script>
</head>

<body>
<header th:replace="~{recruiterView/fragments/recruiterHeader :: headerFragment}"></header>

<div class="dashboard-wrapper">
    <div th:replace="~{recruiterView/fragments/sidebar :: sidebarFragment}"></div>

    <div class="main-container">
        <main class="content-body">
            <div class="posting-card">
                <h2 class="posting-title" th:text="#{job.edit.title}">공고 수정</h2>

                <form th:action="@{/Recruiter/editJobPosting}" method="post" enctype="multipart/form-data"
                      id="jobEditForm">
                    <input type="hidden" name="id" th:value="${jobId}">
                    <input type="hidden" name="region" th:value="${region}">
                    <input type="hidden" name="datanum" th:value="${job.datanum}">

                    <div class="form-group mb-4">
                        <label class="form-label" th:text="#{job.edit.label.title}">제목</label>
                        <input type="text" name="title" class="form-control kumo-input"
                               th:value="${(#locale.language == 'ja' and job.titleJp != null and job.titleJp != '') ? job.titleJp : job.title}"
                               required />
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label" th:text="#{job.edit.label.position}">업무</label>
                            <input type="text" name="position" class="form-control kumo-input"
                                   th:value="${(#locale.language == 'ja' and job.positionJp != null and job.positionJp != '') ? job.positionJp : job.position}" />
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" th:text="#{job.edit.label.desc}">업무 상세</label>
                            <input type="text" name="jobDescription" class="form-control kumo-input"
                                   th:value="${(#locale.language == 'ja' and job.jobDescriptionJp != null and job.jobDescriptionJp != '') ? job.jobDescriptionJp : job.jobDescription}"
                                   th:placeholder="#{job.edit.placeholder.desc}" />
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label" th:text="#{job.edit.label.contact}">연락처</label>
                        <input type="text" id="contactPhone" name="contactPhone" class="form-control kumo-input"
                               th:value="${(#locale.language == 'ja' and job.contactPhoneJp != null and job.contactPhoneJp != '') ? job.contactPhoneJp : job.contactPhone}"
                               th:placeholder="#{job.edit.placeholder.contact}" required />

                        <div id="error_contact" style="display:none; color:#e53e3e; font-size:13px; margin-top:6px;">
                            <i class="fa-solid fa-circle-exclamation"></i>
                            <span id="error_contact_msg"></span>
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="form-label" th:text="#{job.edit.label.salary}">급여</label>
                        <div class="d-flex align-items-center gap-2">
                            <select name="salaryType" class="form-select kumo-input-sm" style="width: 100px;">
                                <option value="HOURLY" th:selected="${job.salaryType == 'HOURLY'}"
                                        th:text="#{job.edit.salary.hourly}">시급</option>
                                <option value="DAILY" th:selected="${job.salaryType == 'DAILY'}"
                                        th:text="#{job.edit.salary.daily}">일급</option>
                                <option value="MONTHLY" th:selected="${job.salaryType == 'MONTHLY'}"
                                        th:text="#{job.edit.salary.monthly}">월급</option>
                                <option value="SALARY" th:selected="${job.salaryType == 'SALARY'}"
                                        th:text="#{job.edit.salary.yearly}">연봉</option>
                            </select>
                            <div class="position-relative flex-grow-1">
                                <input type="text" name="salaryAmount" class="form-control kumo-input"
                                       th:value="${job.salaryAmount}" style="padding-right: 40px;" />
                                <span class="position-absolute end-0 top-50 translate-middle-y me-3 text-muted"
                                      th:text="#{job.edit.salary.currency}">円</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-5">
                        <label class="form-label" th:text="#{job.edit.label.body}">상세정보</label>
                        <textarea name="notes" class="form-control kumo-input" rows="6"
                                  th:utext="${(#locale.language == 'ja' and job.notesJp != null and job.notesJp != '') ? job.notesJp : job.notes}"></textarea>
                    </div>

                    <div class="d-flex justify-content-center gap-3 mb-5 mt-2">
                        <button type="button" class="kumo-btn-cancel" onclick="history.back();"
                                th:text="#{job.edit.btn.cancel}">취소</button>
                        <button type="button" class="kumo-btn-close" onclick="closePosting()"
                                th:text="#{job.edit.btn.close}">마감하기</button>
                        <button type="submit" class="kumo-btn-edit" th:text="#{job.edit.btn.submit}">공고수정</button>
                    </div>
                </form>

            </div>
        </main>
        <footer th:replace="~{NonLoginFragments/NonLoginFooter :: footerFragment}"></footer>
    </div>
    <div th:replace="~{recruiterView/fragments/rightSidebar :: rightSidebarFragment}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.10/index.global.min.js"></script>
</body>
</html>
