<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KUMO Admin - Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/adminView/admin_sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/adminView/admin_post.css}"> <script th:inline="javascript">
    window.CURRENT_LANG = [[${lang}]] || 'ko';
</script>

    <script defer th:src="@{/js/adminView/admin_post.js}"></script>
</head>
<body>

<aside th:replace="~{adminView/admin_sidebar :: admin_sidebar('post', ${lang})}"></aside>

<main class="main-content">

    <form action="/admin/post" method="get" class="top-controls">
        <input type="hidden" name="lang" th:value="${lang}">

        <select name="searchType" class="filter-select">
            <option value="title" th:selected="${searchType == 'title'}"
                    th:text="${lang == 'ja' ? 'タイトル' : '공고 제목'}">공고 제목</option>
            <option value="region" th:selected="${searchType == 'region'}"
                    th:text="${lang == 'ja' ? '地域' : '지역'}">지역</option>
        </select>

        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" name="keyword" class="search-input"
                   th:value="${keyword}"
                   th:placeholder="${lang == 'ja' ? '検索キーワードを入力' : '검색어를 입력하세요'}">
        </div>

        <select name="status" class="filter-select">
            <option value="" th:selected="${status == null || status == ''}"
                    th:text="${lang == 'ja' ? '全状態' : '전체 상태'}">전체 상태</option>
            <option value="RECRUITING" th:selected="${status == 'RECRUITING'}"
                    th:text="${lang == 'ja' ? '承認済み' : '승인됨'}">승인됨</option>
            <option value="CLOSED" th:selected="${status == 'CLOSED'}"
                    th:text="${lang == 'ja' ? '締め切り' : '마감됨'}">마감됨</option>
        </select>

        <button type="submit" class="btn btn-dark btn-search"
                th:text="${lang == 'ja' ? '検索' : '검색'}">검색</button>
    </form>

    <div class="tab-menu">
        <div id="tab-btn-all" class="tab-item active" onclick="switchTab('all')"
             th:text="${lang == 'ja' ? '全求人' : '전체 공고'}">전체 공고</div>
        <div id="tab-btn-report" class="tab-item" onclick="switchTab('report')"
             th:text="${lang == 'ja' ? '申告/遮断' : '신고 / 차단'}">신고 / 차단</div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-dark" onclick="deleteSelectedItems()" th:text="${lang == 'ja' ? '🗑️ 削除' : '🗑️ 삭제'}">🗑️ 삭제</button>
    </div>

    <div id="tab-content-all" class="tab-content active">
        <div class="table-container">
            <table class="custom-table">
                <thead>
                <tr>
                    <th class="col-check">
                        <input type="checkbox" id="checkAllPosts" onclick="toggleAll('postIds', this.checked)">
                    </th>
                    <th class="col-title" th:text="${lang == 'ja' ? '求人情報' : '공고 정보'}">공고 정보</th>
                    <th class="col-cate" th:text="${lang == 'ja' ? 'カテゴリ' : '카테고리'}">카테고리</th>
                    <th class="col-date1" th:text="${lang == 'ja' ? '登録日' : '등록일'}">등록일</th>
                    <th class="col-date2" th:text="${lang == 'ja' ? '地域' : '지역'}">지역</th>
                    <th class="col-status" th:text="${lang == 'ja' ? '状態' : '상태'}">상태</th>
                    <th class="col-manage" th:text="${lang == 'ja' ? '管理' : '관리'}">관리</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${posts.totalElements == 0}">
                    <td colspan="7" style="padding: 50px 0; color: #999; text-align: center;"
                        th:text="${lang == 'ja' ? '検索結果がありません。' : '검색 결과가 없습니다.'}">
                        검색 결과가 없습니다.
                    </td>
                </tr>

                <tr th:each="post : ${posts.content}">
                    <td>
                        <input type="checkbox" name="postIds" th:value="${post.source + '_' + post.id}">
                    </td>

                    <td class="col-title">
                        <a class="title-link"
                           th:href="@{/map/jobs/detail(id=${post.id}, source=${post.source}, lang=${lang})}"
                           target="_blank">
                            <span class="title-text" th:text="${post.title}" th:title="${post.title}">제목</span>
                        </a>
                    </td>

                    <td class="col-cate" th:text="${post.position}">직무</td>

                    <td th:text="${post.createdAt != null ? #temporals.format(post.createdAt, 'yyyy.MM.dd') : '-'}">날짜</td>

                    <td>
                        <span th:text="${#strings.contains(post.source, 'OSAKA') ? (lang == 'ja' ? '大阪' : '오사카') : (lang == 'ja' ? '東京' : '도쿄')}">
                            지역
                        </span>
                    </td>

                    <td>
                        <span class="badge"
                              th:classappend="${post.status == 'CLOSED' ? 'badge-red' : 'badge-green'}"
                              th:text="${post.status == 'CLOSED' ? (lang == 'ja' ? '締め切り' : '마감됨') : (lang == 'ja' ? '承認済み' : '승인됨')}">
                            상태
                        </span>
                    </td>

                    <td>
                        <span class="action-link edit" style="cursor: pointer;"
                              th:onclick="openEditModal([[${post.source}]], [[${post.id}]], [[${post.status}]])"
                              th:text="${lang == 'ja' ? '修正' : '수정'}">수정</span>

                        <span class="action-link delete" style="cursor: pointer;"
                              th:onclick="deleteOnePost([[${post.source}]], [[${post.id}]])"
                              th:text="${lang == 'ja' ? '削除' : '삭제'}">삭제</span>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="pagination-container" th:if="${posts.totalElements > 0}">
                <ul class="pagination">

                    <li th:classappend="${posts.first} ? 'disabled'">
                        <a th:href="@{/admin/post(page=0, lang=${lang}, searchType=${searchType}, keyword=${keyword}, status=${status})}">&laquo;&laquo;</a>
                    </li>

                    <li th:classappend="${posts.first} ? 'disabled'">
                        <a th:href="@{/admin/post(page=${posts.number - 1}, lang=${lang}, searchType=${searchType}, keyword=${keyword}, status=${status})}">&lsaquo;</a>
                    </li>

                    <li th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                        th:classappend="${pageNum == posts.number + 1} ? 'active'">
                        <a th:href="@{/admin/post(page=${pageNum - 1}, lang=${lang}, searchType=${searchType}, keyword=${keyword}, status=${status})}"
                           th:text="${pageNum}">1</a>
                    </li>

                    <li th:classappend="${posts.last} ? 'disabled'">
                        <a th:href="@{/admin/post(page=${posts.number + 1}, lang=${lang}, searchType=${searchType}, keyword=${keyword}, status=${status})}">&rsaquo;</a>
                    </li>

                    <li th:classappend="${posts.last} ? 'disabled'">
                        <a th:href="@{/admin/post(page=${totalPages - 1}, lang=${lang}, searchType=${searchType}, keyword=${keyword}, status=${status})}">&raquo;&raquo;</a>
                    </li>

                </ul>
            </div>
        </div>
    </div>

    <div id="tab-content-report" class="tab-content">
        <div class="table-container">
            <table class="custom-table">
                <thead>
                <tr>
                    <th class="col-check"><input type="checkbox" id="checkAllReports" onclick="toggleAll('reportIds', this.checked)"></th>
                    <th class="col-title" th:text="${lang == 'ja' ? '求人タイトル' : '공고 제목'}">공고 제목</th>
                    <th class="col-cate" th:text="${lang == 'ja' ? '申告者' : '신고자'}">신고자</th>
                    <th class="col-date1" th:text="${lang == 'ja' ? '登録日' : '등록일'}">등록일</th>
                    <th class="col-date2" th:text="${lang == 'ja' ? '事由' : '사유'}">사유</th>
                    <th class="col-status" th:text="${lang == 'ja' ? '状態' : '상태'}">상태</th>
                    <th class="col-manage" th:text="${lang == 'ja' ? '管理' : '관리'}">관리</th>
                </tr>
                </thead>
                <tbody>

                <tr th:if="${#lists.isEmpty(reports)}">
                    <td colspan="7" style="text-align: center; padding: 50px; color: #999;" th:text="${lang == 'ja' ? '申告内訳がありません。' : '신고 내역이 없습니다.'}">신고 내역이 없습니다.</td>
                </tr>

                <tr th:each="report : ${reports}">
                    <td><input type="checkbox" name="reportIds" th:value="${report.reportId}"></td>
                    <td class="col-title">
                        <a class="title-link" th:href="@{/map/jobs/detail(id=${report.targetPostId}, source=${report.targetSource}, lang=${lang})}" target="_blank">
                            <span class="title-text" th:text="${report.targetPostTitle}">제목</span>
                        </a>
                    </td>
                    <td class="col-cate" th:text="${report.reporterEmail}">이메일</td>
                    <td th:text="${#temporals.format(report.createdAt, 'yyyy.MM.dd')}">날짜</td>
                    <td class="col-date2" th:text="${report.reasonCategory}">사유</td>
                    <td>
                        <span class="badge"
                              th:classappend="${report.status == 'PENDING' ? 'badge-grey' : (report.status == 'BLOCKED' ? 'badge-red' : 'badge-green')}"
                              th:text="${report.status == 'PENDING' ? (lang == 'ja' ? '待機中' : '대기중') : (report.status == 'BLOCKED' ? (lang == 'ja' ? '遮断済み' : '차단됨') : (lang == 'ja' ? '完了' : '처리완료'))}">상태</span>
                    </td>
                    <td>
                        <button class="btn-detail" type="button"
                                th:onclick="openReportModal([[${report.reportId}]], [[${report.reporterEmail}]], [[${report.reasonCategory}]], [[${report.description}]], [[${report.status}]], [[${report.targetSource}]], [[${report.targetPostId}]])"
                                th:text="${lang == 'ja' ? '内容확인' : '내용 확인'}">내용 확인</button>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="pagination-container" th:if="${reports.totalElements > 0}">
                <ul class="pagination">
                    <li th:classappend="${reports.first} ? 'disabled'">
                        <a th:href="@{/admin/post(reportPage=0, lang=${lang}, tab='report')}">&laquo;&laquo;</a>
                    </li>
                    <li th:classappend="${reports.first} ? 'disabled'">
                        <a th:href="@{/admin/post(reportPage=${reports.number - 1}, lang=${lang}, tab='report')}">&lsaquo;</a>
                    </li>
                    <li th:each="pageNum : ${#numbers.sequence(reportStartPage, reportEndPage)}"
                        th:classappend="${pageNum == reports.number + 1} ? 'active'">
                        <a th:href="@{/admin/post(reportPage=${pageNum - 1}, lang=${lang}, tab='report')}"
                           th:text="${pageNum}">1</a>
                    </li>
                    <li th:classappend="${reports.last} ? 'disabled'">
                        <a th:href="@{/admin/post(reportPage=${reports.number + 1}, lang=${lang}, tab='report')}">&rsaquo;</a>
                    </li>
                    <li th:classappend="${reports.last} ? 'disabled'">
                        <a th:href="@{/admin/post(reportPage=${reportTotalPages - 1}, lang=${lang}, tab='report')}">&raquo;&raquo;</a>
                    </li>
                </ul>
            </div>

        </div>
    </div>
</main>

<div id="editPostModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3 th:text="${lang == 'ja' ? '求人状態の変更' : '공고 상태 변경'}">공고 상태 변경</h3>

        <input type="hidden" id="editPostSource">
        <input type="hidden" id="editPostId">

        <div class="form-group">
            <label th:text="${lang == 'ja' ? '状態 (承認/締め切り)' : '상태 설정 (승인/마감)'}">상태</label>
            <select id="editPostStatus">
                <option value="RECRUITING" th:text="${lang == 'ja' ? '承認済み (募集中)' : '승인됨 (모집중)'}">승인됨</option>
                <option value="CLOSED" th:text="${lang == 'ja' ? '締め切り' : '마감됨'}">마감됨</option>
            </select>
        </div>

        <div class="modal-actions">
            <button class="btn-outline" onclick="closeEditModal()" th:text="${lang == 'ja' ? 'キャンセル' : '취소'}">취소</button>
            <button class="btn-dark" onclick="submitEdit()" th:text="${lang == 'ja' ? '確認' : '확인'}">확인</button>
        </div>
    </div>
</div>

<div id="reportModal" class="modal-overlay" style="display: none;">
    <div class="report-modal-content">
        <h3 th:text="${lang == 'ja' ? '申告内容の確認' : '신고 내용 확인'}">신고 내용 확인</h3>

        <input type="hidden" id="reportIdVal">
        <input type="hidden" id="reportTargetSource">
        <input type="hidden" id="reportTargetPostId">

        <div class="report-info-group">
            <span class="label" th:text="${lang == 'ja' ? '申告者' : '신고자 이메일'}">신고자 이메일</span>
            <span class="value" id="reportEmailVal">user@email.com</span>
        </div>

        <div class="report-info-group">
            <span class="label" th:text="${lang == 'ja' ? '申告カテゴリ' : '신고 카테고리'}">신고 카테고리</span>
            <span class="value" id="reportCategoryVal">카테고리명</span>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <label th:text="${lang == 'ja' ? '申告内容' : '신고 상세 내용'}">신고 상세 내용</label>
            <div id="reportDescVal" class="report-desc-box">
                여기에 신고 내용이 출력됩니다.
            </div>
        </div>

        <div class="form-group">
            <label th:text="${lang == 'ja' ? '申告処理状態' : '신고 처리 상태'}">신고 처리 상태</label>
            <select id="reportStatusSelect">
                <option value="PENDING" th:text="${lang == 'ja' ? '待機中' : '대기중'}">대기중</option>
                <option value="CLOSED" th:text="${lang == 'ja' ? '処理完了' : '처리완료'}">처리완료</option>
                <option value="BLOCKED" th:text="${lang == 'ja' ? '遮断済み' : '차단됨'}">차단됨</option>
            </select>
        </div>

        <div class="modal-actions">
            <button class="btn-outline" onclick="closeReportModal()" th:text="${lang == 'ja' ? '閉じる' : '닫기'}">닫기</button>
            <button class="btn-dark" onclick="submitReportStatus()" th:text="${lang == 'ja' ? '保存' : '상태 저장'}">상태 저장</button>
        </div>
    </div>
</div>

</body>
</html>
