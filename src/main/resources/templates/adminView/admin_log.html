<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>KUMO Admin - Server Logs</title>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
	
	<link rel="stylesheet" th:href="@{/css/adminView/admin_log.css}">
	<link rel="stylesheet" th:href="@{/css/adminView/admin_sidebar.css}">
	
	<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
	
	<script defer th:src="@{/js/adminView/admin_log.js}"></script>
</head>
<body>

<aside th:replace="~{adminView/admin_sidebar :: admin_sidebar('log', ${lang})}"></aside>

<main class="main-content">
	<header class="content-header">
		<h2 class="page-title" th:text="#{admin.log.title}">DataOps</h2>
		<div class="header-right">
			<span class="admin-name" th:text="${adminName}">Admin</span>
			<div class="profile-circle"></div>
		</div>
	</header>
	
	<div class="log-container">
		<div class="terminal-window">
			<div class="terminal-header">
				<div class="terminal-buttons">
					<span class="dot red"></span>
					<span class="dot yellow"></span>
					<span class="dot green"></span>
				</div>
				<div class="terminal-title">kumo-server-log</div>
			</div>
			<div class="terminal-body">
				<pre id="logOutput" class="terminal-content"><th:block th:each="log : ${loginLogs}"><span class="cmd">[<span th:text="${#temporals.format(log.attemptTime, 'yyyy-MM-dd HH:mm:ss')}"></span>]</span> <span th:class="${log.isSuccess ? 'info' : 'red'}" th:text="${log.isSuccess ? 'INFO ' : 'FAIL '}"></span><span> - User: </span><span class="cmd" th:text="${log.email}"></span><span> | IP: </span><span th:text="${log.clientIp}"></span><span th:if="${!log.isSuccess}" th:text="${' | Reason: ' + log.failReason}"></span><br/></th:block><span id="cursor" class="cursor">_</span></pre>
			</div>
		</div>
	</div>
</main>

</body>
</html>
