<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="#{scout.page.title}">KUMO - 스카우트 현황</title>
    <link rel="stylesheet" th:href="@{/css/SeekerView/myPage.css}">
    <link rel="stylesheet" th:href="@{/css/SeekerView/scout.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div th:replace="~{AuthenticatedFragments/AuthenticatedHeader :: headerFragment}"></div>

    <div class="mypage-container">
        <aside th:replace="~{SeekerView/SeekerSidebar :: sidebarFragment('scout')}"></aside>

        <main class="content-area">
            <div class="content-header">
                <h2 th:text="#{sidebar.scout}">스카우트 현황</h2>
            </div>

            <div class="scout-container">
                <div class="scout-list">
                    <!-- 목록이 비었을 때 -->
                    <div th:if="${offers == null or #lists.isEmpty(offers)}" class="text-center py-5">
                        <p class="text-muted" th:text="#{scout.empty}">받은 스카우트 제의가 없습니다.</p>
                    </div>

                    <!-- 목록 아이템 -->
                    <div class="scout-card" th:each="o : ${offers}">
                        <div class="recruiter-info">
                            <img class="recruiter-img"
                                th:src="${o.recruiter.profileImage?.fileUrl ?: '/images/common/default_profile.png'}"
                                alt="avatar">
                            <div>
                                <div class="biz-name" th:text="${o.recruiter.nickname} + ' ' + #{scout.card.boss}">사장님
                                    이름</div>
                                <div class="offer-date" th:text="${#temporals.format(o.createdAt, 'yyyy-MM-dd HH:mm')}">
                                    2024-03-02</div>
                            </div>
                        </div>

                        <div class="scout-action">
                            <button class="btn-chat" th:onclick="|openScoutChat('${o.recruiter.userId}')|">
                                <i class="fa-solid fa-comments me-2"></i>
                                <span th:text="#{scout.btn.chat}">대화하기</span>
                            </button>
                            <button type="button" class="btn-delete-scout" th:data-id="${o.scoutId}"
                                th:title="#{scout.btn.delete}">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{NonLoginFragments/NonLoginFooter :: footerFragment}"></div>

    <th:block th:replace="~{fragments/floatingChat :: floatingChatFragment}"></th:block>

    <script th:inline="javascript">
        /* <![CDATA[ */
        window.SCOUT_LANG = {
            confirmDelete:  /*[[#{scout.confirm.delete}]]*/ '이 제안을 목록에서 삭제하시겠습니까?',
            confirmTitle:   /*[[#{scout.confirm.title}]]*/ '삭제 확인',
            confirmBtn:     /*[[#{scout.confirm.btn}]]*/ '삭제',
            cancelBtn:      /*[[#{scout.cancel.btn}]]*/ '취소',
            successMsg:     /*[[#{scout.delete.success}]]*/ '삭제되었습니다.',
            emptyMsg:       /*[[#{scout.empty}]]*/ '받은 스카우트 제의가 없습니다.',
            errorMsg:       /*[[#{scout.delete.error}]]*/ '삭제 중 오류가 발생했습니다.',
            networkError:   /*[[#{scout.network.error}]]*/ '서버와 통신 중 오류가 발생했습니다.'
        };
        /* ]]> */
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/SeekerView/scout.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
