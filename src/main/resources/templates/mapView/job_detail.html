<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <title th:text="${job.title}">상세 정보</title>

    <link rel="stylesheet" th:href="@{/css/NonLoginFragments/NonLoginFooter.css}">
    <link rel="stylesheet" th:href="@{/css/mapView/job_detail.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" th:href="@{/css/recruiter/recruiterHeader.css}" />
    <link rel="stylesheet" th:href="@{/css/AuthenticatedFragments/AuthenticatedHeader.css}">

    <script th:inline="javascript">
        /* <![CDATA[ */
        const isUserLoggedIn = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
        const currentLang = (typeof window.getKumoLang === 'function') ? window.getKumoLang() : 'ko';

        const MESSAGES = {
            loginRequired: /*[[#{job.msg.loginRequired}]]*/ '로그인이 필요합니다.',
            reportSuccess: /*[[#{job.msg.reportSuccess}]]*/ '신고가 접수되었습니다.',
            reportError:   /*[[#{job.msg.reportError}]]*/ '신고 처리 중 오류가 발생했습니다.',
            confirmReport: /*[[#{job.msg.confirmReport}]]*/ '정말 신고하시겠습니까?',
            selectReportType: /*[[#{job.msg.selectReportType}]]*/ '신고 유형을 선택해주세요.',
            applyReady:    /*[[#{job.msg.applyReady}]]*/ '지원을 준비 중입니다.',
            processError:  /*[[#{job.msg.processError}]]*/ '처리 중 오류가 발생했습니다.'
        };
        /* ]]> */
    </script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script defer th:src="@{/js/mapView/job_detail.js}"></script>

</head>
<body>

<div class="map-header-wrapper">
    <div th:replace="~{NonLoginFragments/NonLoginHeader :: headerFragment}" sec:authorize="!isAuthenticated()"></div>

    <div th:replace="~{AuthenticatedFragments/AuthenticatedHeader :: headerFragment}" sec:authorize="hasRole('SEEKER')">
    </div>

    <header th:replace="~{recruiterView/fragments/recruiterHeader :: headerFragment}"
            sec:authorize="hasRole('RECRUITER')"></header>
</div>

<th:block sec:authorize="hasRole('RECRUITER')">
    <script defer th:src="@{/js/recruiter/recruiterHeader.js}"></script>
</th:block>

<div class="container">
    <div class="header-section">
        <h1 class="job-title" th:text="${job.title}">구인 제목</h1>
        <div class="job-meta">
            <span th:text="${job.address} + ' • ' + (${lang == 'ja' ? '住所' : '주소'})">주소</span>
            <span>•</span>
            <span th:text="${lang == 'ja' ? '閲覧数 : ' : '조회수 : '}">조회수 : </span><span th:text="${job.viewCount}">0</span>
        </div>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <span class="info-label" th:text="${lang == 'ja' ? '会社名' : '회사 이름'}">회사 이름</span>
            <span class="info-value" th:text="${job.companyName}">-</span>
        </div>

        <div class="info-item text-right">
            <span class="info-label" th:text="${lang == 'ja' ? '職種' : '업무'}">업무</span>
            <span class="info-value" th:text="${job.position ?: '-'}">-</span>
        </div>

        <div class="info-item">
            <span class="info-label" th:text="${lang == 'ja' ? '給与' : '급여'}">급여</span>
            <span class="info-value" th:text="${job.wage}">-</span>
        </div>

        <div class="info-item text-right">
            <span class="info-label" th:text="${lang == 'ja' ? '仕事内容' : '업무 상세'}">업무 상세</span>
            <span class="info-value" th:text="${job.jobDescription ?: '-'}">-</span>
        </div>

        <div class="info-item">
            <span class="info-label" th:text="${lang == 'ja' ? '連絡先' : '연락처'}">연락처</span>
            <span class="info-value" th:text="${job.contactPhone}">-</span>
        </div>
        <div class="info-item text-right">
            <span class="info-label" th:text="${lang == 'ja' ? '会社住所' : '회사 주소'}">회사 주소</span>
            <span class="info-value" th:text="${job.address}">-</span>
        </div>
    </div>

    <div class="map-section" th:if="${job.lat != null}">
        <iframe width="100%" height="100%" frameborder="0" style="border:0"
                th:src="'https://maps.google.com/maps?q=' + ${job.lat} + ',' + ${job.lng} + '&hl=es;z=14&output=embed'"
                allowfullscreen="true">
        </iframe>
    </div>

    <div class="map-section" th:unless="${job.lat != null}"
         style="display:flex; align-items:center; justify-content:center; color:#999;"
         th:text="${lang == 'ja' ? '地図情報がありません。' : '지도 정보가 없는 공고입니다.'}">
        지도 정보가 없는 공고입니다.
    </div>

    <div class="description-section">
        <h3 class="section-title" th:text="${lang == 'ja' ? '詳細情報' : '상세정보'}">상세정보</h3>
        <div class="description-text" th:text="${job.notes}">
            내용이 없습니다.
        </div>
    </div>

    <div class="image-gallery" th:if="${job.imgUrls != null and not #strings.isEmpty(job.imgUrls)}">
        <div th:with="pureUrl=${job.imgUrls.replaceAll('[\[\]\s\r\n\t]', '')}">
            <th:block th:each="singleUrl : ${pureUrl.split(',')}">
                <img th:if="${#strings.length(singleUrl) > 3}"
                     th:src="@{|${singleUrl}|}"
                     class="gallery-img"
                     alt="상세 이미지"
                     referrerpolicy="no-referrer"
                     style="display: block; width: 100%; margin-bottom: 15px; border-radius: 8px; min-height: 100px; background-color: #f8f8f8; object-fit: contain;" />
            </th:block>
        </div>
    </div>
</div>

<div class="fixed-bottom-bar" th:if="${isOwner}">
    <div class="btn-group-owner">
        <button class="btn-action btn-edit"
                th:data-id="${job.id}"
                th:data-source="${job.source}"
                onclick="editJob(this)"
                th:text="${lang == 'ja' ? '修正' : '공고 수정'}">
            공고 수정
        </button>

        <button class="btn-action btn-delete"
                th:data-id="${job.id}"
                th:data-source="${job.source}"
                onclick="deleteJob(this)"
                th:text="${lang == 'ja' ? '削除' : '삭제'}">
            삭제
        </button>
    </div>
</div>

<div class="fixed-bottom-bar" th:if="${isSeeker}">
    <div class="btn-group-seeker">

        <div class="seeker-left">
            <button class="btn-icon" id="chatToggleBtn"
                    th:title="${lang == 'ja' ? '1:1チャット' : '1:1 채팅하기'}"
                    th:data-has-user="${job.userId != null}"
                    th:data-recruiter-id="${job.userId}"
                    th:data-job-id="${job.id}"
                    th:data-user-id="${loginUserId}"
                    th:data-source="${job.source}"
                    onclick="handleChatClick(this)">

                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 21a9 9 0 1 0-8.5-5.6L2 22l6.6-1.6A9 9 0 0 0 12 21z"></path>
                    <circle cx="8.5" cy="11.5" r="1" fill="#999" stroke="none"></circle>
                    <circle cx="12" cy="11.5" r="1" fill="#999" stroke="none"></circle>
                    <circle cx="15.5" cy="11.5" r="1" fill="#999" stroke="none"></circle>
                </svg>

            </button>
        </div>

        <div class="seeker-center">
            <button class="btn-action btn-apply" th:data-id="${job.id}" th:data-source="${job.source}"
                    th:text="${lang == 'ja' ? '応募する' : '구인 신청'}" onclick="applyForJob(this)">
                구인 신청
            </button>
        </div>

        <div class="seeker-right">
            <button class="btn-icon btn-scrap" th:data-id="${job.id}" th:data-source="${job.source}"
                    onclick="toggleScrap(this)">
                <svg width="28" height="28" viewBox="0 0 24 24" th:fill="${isScraped == true ? '#4285F4' : 'none'}"
                     th:stroke="${isScraped == true ? '#4285F4' : '#999'}" stroke-width="1.5">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
            <button class="btn-icon" onclick="openReportModal()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ff4d4f" stroke-width="1.5"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
            </button>
            <button class="btn-icon" onclick="window.history.back()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
        </div>

    </div>
</div>

<div id="reportModal" class="modal-overlay" style="display: none;">
    <div class="modal-window">
        <div class="modal-header">
            <h3 th:text="${lang == 'ja' ? '申告する' : '신고하기'}">신고하기</h3>
            <button class="btn-close-modal" onclick="closeReportModal()">×</button>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label th:text="${lang == 'ja' ? 'タイトル' : '글 제목'}">글 제목</label>
                <input type="text" class="modal-input" th:value="${job.title}" readonly>
            </div>

            <div class="form-group">
                <label th:text="${lang == 'ja' ? '種類' : '종류'}">종류</label>
                <select class="modal-select" id="reportType">
                    <option value="" th:text="${lang == 'ja' ? '選択してください' : '선택해주세요'}">선택해주세요</option>
                    <option value="spam" th:text="${lang == 'ja' ? 'スパム / 不適切な宣伝' : '스팸 / 부적절한 홍보'}">스팸 / 부적절한 홍보</option>
                    <option value="false_info" th:text="${lang == 'ja' ? '虚偽の求人' : '허위 공고'}">허위 공고</option>
                    <option value="abuse" th:text="${lang == 'ja' ? '暴言 / 誹謗中傷' : '욕설 / 비하 발언'}">욕설 / 비하 발언</option>
                    <option value="other" th:text="${lang == 'ja' ? 'その他' : '기타'}">기타</option>
                </select>
            </div>

            <div class="form-group">
                <label th:text="${lang == 'ja' ? '詳細内容' : '상세내용'}">상세내용</label>
                <textarea class="modal-textarea" id="reportDetail" th:placeholder="${lang == 'ja' ? '申告の理由を詳細に入力してください。' : '신고 사유를 상세히 입력해주세요.'}"></textarea>
            </div>

            <div class="modal-footer">
                <button class="btn-submit-report" onclick="submitReport()" th:text="${lang == 'ja' ? '申告する' : '신고하기'}">신고하기</button>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/floatingChat :: floatingChatFragment}"></th:block>

</body>
</html>
