info.dev2.role=Smart Cloud IT Master 48期

# Dev 3 (Ham)
info.dev3.comment=直感的な求人検索の核心。複雑な位置データを美しく視覚化し、全体的な地図（Map）サービスの基盤を固めました。
info.dev3.name=ハム・ジュンウ
info.dev3.role=Smart Cloud IT Master 48期

# Dev 4 (Lee)
info.dev4.comment=一KUMOの全体的なデザインの枠組みを作り、求人者ページを実装しました。誰もが見やすくてすっきりとした環境を作ることに集中しました。
info.dev4.name=イ・ウォンウ
info.dev4.role=Smart Cloud IT Master 48期

# Dev 5 (Kim)
info.dev5.comment=求人者と求職者を最も早く繋ぐ架け橋。途切れることのないリアルタイムなコミュニケーションのため、WebSocketベースのチャットシステムを構築しました。
