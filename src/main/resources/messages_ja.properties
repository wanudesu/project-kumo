info.dev1.role=Smart Cloud IT Master 48期

# Dev 2 (Hwang)
info.dev2.comment=地図上の情報を隙間なく結びつけました。ジュンウさんと協力し、マップのロジックと数多くの採用情報データの連動を実装しました。
